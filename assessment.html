<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assessment · EdgeKeeper</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:     #050505;
      --obsidian:  #0a0a0a;
      --stone:     #111111;
      --border:    #1e1e1e;
      --dim:       #2a2a2a;
      --muted:     #555555;
      --text:      #d4d0c8;
      --bright:    #e8e4dc;
      --white:     #f5f2ec;
      --gold:      #b8a06a;
      --gold-dim:  #7a6a45;
      --green-b:   #6b8c6b;
      --green-dim: #4a5c4a;
      --serif:     'Cormorant Garamond', Georgia, serif;
      --sans:      'Inter', sans-serif;
      --mono:      'DM Mono', monospace;
      /* set by JS based on mentor */
      --mc:        #b8a06a;
      --mc-dim:    #7a6a45;
      --mc-bg:     rgba(184,160,106,0.06);
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--text);
      font-family: var(--sans);
      font-weight: 300;
      line-height: 1.7;
      cursor: none;
      overflow: hidden;
    }

    /* ── CUSTOM CURSOR ── */
    #cursor {
      position: fixed; width: 8px; height: 8px;
      background: var(--mc); border-radius: 50%;
      pointer-events: none; z-index: 9999;
      transform: translate(-50%,-50%);
      transition: background 0.4s ease;
    }
    #cursor-ring {
      position: fixed; width: 36px; height: 36px;
      border: 1px solid rgba(184,160,106,0.25); border-radius: 50%;
      pointer-events: none; z-index: 9998;
      transform: translate(-50%,-50%);
      transition: left .1s ease, top .1s ease, border-color 0.4s ease;
    }

    /* ── MAIN LAYOUT ── */
    #assessment-shell {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    /* ── TOP LABEL ── */
    #top-label {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 22px 48px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      z-index: 10;
    }
    #top-brand {
      font-family: var(--serif);
      font-size: 0.85rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
    }
    #top-brand span { color: var(--mc-dim); transition: color 0.4s ease; }
    #top-meta {
      font-family: var(--mono);
      font-size: 0.52rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      display: flex; align-items: center; gap: 10px;
    }
    #top-meta::before {
      content: '';
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--mc);
      flex-shrink: 0;
      animation: blink-dot 2.5s ease-in-out infinite;
      transition: background 0.4s ease;
    }
    @keyframes blink-dot { 0%,100%{opacity:1} 50%{opacity:.35} }

    /* ── QUESTION FIELD ── */
    #question-field {
      max-width: 580px;
      width: 100%;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 500ms ease, transform 500ms ease;
    }
    #question-field.visible {
      opacity: 1;
      transform: translateY(0);
    }
    #question-field.hiding {
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 300ms ease, transform 300ms ease;
    }

    /* mentor signature line above question */
    .q-mentor-sig {
      font-family: var(--mono);
      font-size: 0.52rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--mc-dim);
      margin-bottom: 28px;
      display: flex; align-items: center; gap: 14px;
      transition: color 0.4s ease;
    }
    .q-mentor-sig::before {
      content: '';
      width: 24px; height: 1px;
      background: var(--mc-dim);
      flex-shrink: 0;
      transition: background 0.4s ease;
    }

    /* the question itself */
    #question-text {
      font-family: var(--serif);
      font-size: clamp(1.3rem, 2vw, 1.55rem);
      font-weight: 300;
      line-height: 1.75;
      color: rgba(245,242,236,0.85);
      margin-bottom: 40px;
    }

    /* divider line between question and input */
    .q-divider {
      width: 40px; height: 1px;
      background: var(--mc-dim);
      margin-bottom: 28px;
      transition: background 0.4s ease;
    }

    /* ── TEXTAREA ── */
    #answer-textarea {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      outline: none;
      resize: none;
      padding: 0 0 14px 0;
      font-family: var(--serif);
      font-size: 1rem;
      font-weight: 300;
      line-height: 1.9;
      color: rgba(212,208,200,0.8);
      min-height: 80px;
      overflow: hidden;
      cursor: none;
      transition: border-color 0.3s ease;
    }
    #answer-textarea::placeholder {
      color: rgba(255,255,255,0.18);
    }
    #answer-textarea:focus {
      border-bottom-color: rgba(255,255,255,0.22);
    }

    /* ── SMALL TEXT INPUT (one-word answers) ── */
    #answer-short {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      outline: none;
      padding: 0 0 14px 0;
      font-family: var(--serif);
      font-size: 1rem;
      font-weight: 300;
      line-height: 1.9;
      color: rgba(212,208,200,0.8);
      cursor: none;
      transition: border-color 0.3s ease;
      display: none;
    }
    #answer-short::placeholder {
      color: rgba(255,255,255,0.18);
    }
    #answer-short:focus {
      border-bottom-color: rgba(255,255,255,0.22);
    }

    /* ── PILL OPTIONS ── */
    #pill-container {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 4px;
      display: none;
    }
    .pill {
      font-family: var(--mono);
      font-size: 0.58rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(212,208,200,0.55);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 9px 18px;
      cursor: none;
      transition: color 0.3s ease, border-color 0.3s ease, background 0.3s ease;
      user-select: none;
    }
    .pill:hover {
      color: var(--mc);
      border-color: rgba(184,160,106,0.3);
    }
    .pill.selected {
      color: var(--mc);
      border-color: var(--mc-dim);
      background: var(--mc-bg);
    }

    /* ── CONTINUE BUTTON ── */
    #continue-btn {
      margin-top: 32px;
      display: inline-block;
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--mc);
      background: transparent;
      border: none;
      padding: 0;
      cursor: none;
      opacity: 0.3;
      transition: opacity 0.3s ease, color 0.4s ease;
      pointer-events: none;
    }
    #continue-btn.enabled {
      opacity: 1;
      pointer-events: all;
    }
    #continue-btn.enabled:hover {
      opacity: 0.7;
    }

    /* ── PROGRESS ── */
    #progress-label {
      position: fixed;
      bottom: 28px; right: 40px;
      font-family: var(--mono);
      font-size: 0.5rem;
      letter-spacing: 0.18em;
      color: rgba(255,255,255,0.18);
      text-transform: uppercase;
    }

    /* ── CLOSING SCREEN ── */
    #closing-screen {
      position: fixed; inset: 0; z-index: 50;
      display: flex; align-items: center; justify-content: center;
      background: var(--black);
      opacity: 0; pointer-events: none;
      transition: opacity 1s ease;
    }
    #closing-screen.visible {
      opacity: 1; pointer-events: all;
    }
    #closing-text {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--mc-dim);
      transition: color 0.4s ease;
    }

    /* ── PATH SELECTION SCREEN ── */
    #path-field {
      max-width: 580px;
      width: 100%;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 500ms ease, transform 500ms ease;
    }
    #path-field.visible {
      opacity: 1;
      transform: translateY(0);
    }
    #path-field.hiding {
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 300ms ease, transform 300ms ease;
    }

    #path-header {
      font-family: var(--mono);
      font-size: 0.52rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--mc-dim);
      margin-bottom: 28px;
      display: flex; align-items: center; gap: 14px;
    }
    #path-header::before {
      content: '';
      width: 24px; height: 1px;
      background: var(--mc-dim);
      flex-shrink: 0;
    }

    #path-question {
      font-family: var(--serif);
      font-size: clamp(1.3rem, 2vw, 1.55rem);
      font-weight: 300;
      line-height: 1.75;
      color: rgba(245,242,236,0.85);
      margin-bottom: 44px;
    }

    #path-options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .path-block {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 22px 28px;
      border: 1px solid rgba(255,255,255,0.07);
      cursor: none;
      transition: border-color 0.4s ease, background 0.4s ease;
      min-height: 80px;
    }
    .path-block:hover {
      border-color: rgba(184,160,106,0.35);
      background: rgba(184,160,106,0.03);
    }
    .path-block.selected {
      border-color: var(--gold);
      background: rgba(184,160,106,0.05);
    }

    /* override for ashley */
    body.ashley .path-block:hover {
      border-color: rgba(107,140,107,0.35);
      background: rgba(74,92,74,0.03);
    }
    body.ashley .path-block.selected {
      border-color: var(--green-b);
      background: rgba(74,92,74,0.05);
    }

    .path-numeral {
      font-family: var(--serif);
      font-size: 1.1rem;
      font-weight: 300;
      color: rgba(184,160,106,0.35);
      flex-shrink: 0;
      width: 28px;
      transition: color 0.4s ease;
    }
    .path-block.selected .path-numeral,
    .path-block:hover .path-numeral {
      color: var(--mc-dim);
    }

    .path-copy {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .path-name {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(212,208,200,0.7);
      transition: color 0.3s ease;
    }
    .path-block.selected .path-name,
    .path-block:hover .path-name {
      color: var(--mc);
    }
    .path-desc {
      font-family: var(--serif);
      font-size: 0.9rem;
      font-weight: 300;
      color: rgba(212,208,200,0.35);
      line-height: 1.5;
    }

    #path-continue {
      margin-top: 36px;
      display: inline-block;
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--mc);
      background: transparent;
      border: none;
      padding: 0;
      cursor: none;
      opacity: 0.3;
      transition: opacity 0.3s ease, color 0.4s ease;
      pointer-events: none;
    }
    #path-continue.enabled {
      opacity: 1;
      pointer-events: all;
    }
    #path-continue.enabled:hover {
      opacity: 0.7;
    }

    /* ── SCROLLBAR ── */
    * { scrollbar-width: none; }
    *::-webkit-scrollbar { display: none; }

    /* ── MOBILE ── */
    @media (max-width: 600px) {
      #top-label { padding: 16px 22px; }
      #assessment-shell { padding: 32px 20px; }
      #question-text { font-size: 1.2rem; }
      #path-question { font-size: 1.2rem; }
      #progress-label { right: 22px; bottom: 20px; }
      .path-block { padding: 18px 20px; gap: 18px; min-height: 72px; }
      .path-numeral { font-size: 1rem; }
    }
  </style>
</head>
<body>

  <!-- cursor -->
  <div id="cursor"></div>
  <div id="cursor-ring"></div>
  <div aria-hidden="true" style="position:fixed;inset:0;z-index:0;background:url('/assets/assessment-ambient.png') center/cover no-repeat;opacity:0.05;pointer-events:none;"></div>

  <!-- top bar -->
  <div id="top-label">
    <a href="/" id="top-brand">Edge<span>Keeper</span></a>
    <div id="top-meta">
      <span id="mentor-name-label">Marcus</span>
      &middot;
      Initial Assessment
    </div>
  </div>

  <!-- main field -->
  <div id="assessment-shell">

    <!-- Step 0: path selection -->
    <div id="path-field">
      <div id="path-header" class="q-mentor-sig-el"></div>
      <div id="path-question">Which best describes you right now?</div>
      <div id="path-options">
        <div class="path-block" data-path="foundation">
          <div class="path-numeral">I</div>
          <div class="path-copy">
            <div class="path-name">Foundation</div>
            <div class="path-desc">I'm new to trading. I want to learn from scratch.</div>
          </div>
        </div>
        <div class="path-block" data-path="development">
          <div class="path-numeral">II</div>
          <div class="path-copy">
            <div class="path-name">Development</div>
            <div class="path-desc">I trade but struggle with consistency or discipline.</div>
          </div>
        </div>
        <div class="path-block" data-path="performance">
          <div class="path-numeral">III</div>
          <div class="path-copy">
            <div class="path-name">Performance</div>
            <div class="path-desc">I'm an experienced trader looking to optimize.</div>
          </div>
        </div>
      </div>
      <button id="path-continue" type="button">Continue &rarr;</button>
    </div>

    <!-- Step 1+: questions -->
    <div id="question-field" style="display:none;">
      <div class="q-mentor-sig" id="mentor-sig"></div>
      <div id="question-text"></div>
      <div class="q-divider" id="q-divider"></div>
      <!-- textarea for long answers -->
      <textarea
        id="answer-textarea"
        rows="3"
        placeholder="..."
        spellcheck="false"
        autocomplete="off"
      ></textarea>
      <!-- small input for one-word answers -->
      <input
        id="answer-short"
        type="text"
        placeholder="..."
        spellcheck="false"
        autocomplete="off"
      />
      <!-- pill options for choice questions -->
      <div id="pill-container"></div>
      <button id="continue-btn" type="button">Continue &rarr;</button>
    </div>

  </div>

  <!-- progress -->
  <div id="progress-label"></div>

  <!-- closing screen -->
  <div id="closing-screen">
    <div id="closing-text"></div>
  </div>

  <script>
    /* ── CONFIG ─────────────────────────────── */
    const SUPABASE_URL  = window.__EK_SUPABASE_URL__;
    const SUPABASE_ANON = window.__EK_SUPABASE_ANON__;

    /* ── MENTOR ─────────────────────────────── */
    const mentor = (localStorage.getItem('ek_mentor') || 'mike').toLowerCase();
    const isMarcus = mentor !== 'ashley';

    const ACCENT      = isMarcus ? '#b8a06a' : '#6b8c6b';
    const ACCENT_DIM  = isMarcus ? '#7a6a45' : '#4a5c4a';
    const ACCENT_BG   = isMarcus ? 'rgba(184,160,106,0.06)' : 'rgba(74,92,74,0.06)';
    const MENTOR_LABEL = isMarcus ? 'Marcus' : 'Iris';

    /* inject CSS vars */
    document.documentElement.style.setProperty('--mc',     ACCENT);
    document.documentElement.style.setProperty('--mc-dim', ACCENT_DIM);
    document.documentElement.style.setProperty('--mc-bg',  ACCENT_BG);

    /* body class for ashley overrides */
    if (!isMarcus) document.body.classList.add('ashley');

    /* update text labels */
    document.getElementById('mentor-name-label').textContent = MENTOR_LABEL;
    document.getElementById('mentor-sig').textContent        = MENTOR_LABEL;

    /* path screen header */
    document.getElementById('path-header').textContent = MENTOR_LABEL;

    /* cursor ring border color */
    document.getElementById('cursor-ring').style.borderColor =
      isMarcus ? 'rgba(184,160,106,0.25)' : 'rgba(74,92,74,0.25)';

    /* ── CURSOR ─────────────────────────────── */
    const cursor     = document.getElementById('cursor');
    const cursorRing = document.getElementById('cursor-ring');
    let mx = -100, my = -100, rx = -100, ry = -100;

    document.addEventListener('mousemove', e => {
      mx = e.clientX; my = e.clientY;
      cursor.style.left = mx + 'px';
      cursor.style.top  = my + 'px';
    });

    (function animRing() {
      rx += (mx - rx) * 0.12;
      ry += (my - ry) * 0.12;
      cursorRing.style.left = rx + 'px';
      cursorRing.style.top  = ry + 'px';
      requestAnimationFrame(animRing);
    })();

    /* ── QUESTION SETS ──────────────────────── */

    const QUESTIONS_FOUNDATION = [
      {
        key: 'motivation',
        type: 'textarea',
        text: "What drew you to trading?",
        placeholder: "What brought you here..."
      },
      {
        key: 'time_commitment',
        type: 'pills',
        text: "How much time can you commit to learning each week?",
        options: [
          { label: '1–2 hours',       value: 'light' },
          { label: '3–5 hours',       value: 'moderate' },
          { label: '5–10 hours',      value: 'intensive' },
          { label: 'More than 10',    value: 'full_time' }
        ]
      },
      {
        key: 'market_interest',
        type: 'multi-pills',
        text: "Which markets are you most interested in?",
        options: [
          { label: 'Stocks',   value: 'stocks' },
          { label: 'Forex',    value: 'forex' },
          { label: 'Crypto',   value: 'crypto' },
          { label: 'Futures',  value: 'futures' }
        ]
      },
      {
        key: 'biggest_concern',
        type: 'pills',
        text: "What's your biggest concern about learning to trade?",
        options: [
          { label: 'Losing money',              value: 'loss_fear' },
          { label: 'Information overload',      value: 'overwhelm' },
          { label: 'Not knowing where to start', value: 'direction' },
          { label: 'Finding time',              value: 'time' }
        ]
      },
      {
        key: 'emotional_state_entry',
        type: 'short',
        text: "One word that describes how you feel right now about trading:",
        placeholder: "excited, nervous, curious..."
      }
    ];

    const QUESTIONS_DEVELOPMENT = [
      {
        key: 'experience_duration',
        type: 'pills',
        text: "How long have you been trading actively?",
        options: [
          { label: 'Less than 6 months', value: 'new' },
          { label: '6 months to 2 years', value: 'developing' },
          { label: '2 to 5 years',        value: 'intermediate' },
          { label: '5+ years',            value: 'veteran' }
        ]
      },
      {
        key: 'biggest_challenge',
        type: 'pills',
        text: "What breaks down most often for you?",
        options: [
          { label: 'I break my own rules', value: 'rule_breaks' },
          { label: 'I revenge trade',      value: 'revenge' },
          { label: 'I overtrade',          value: 'overtrade' },
          { label: 'I freeze up',          value: 'paralysis' }
        ]
      },
      {
        key: 'loss_response',
        type: 'pills',
        text: "How do you respond after a losing session?",
        options: [
          { label: 'I stop for the day',     value: 'stop' },
          { label: 'I try to recover it',    value: 'recover' },
          { label: 'I get angry',            value: 'anger' },
          { label: 'I analyze and move on',  value: 'analyze' }
        ]
      },
      {
        key: 'rules_status',
        type: 'pills',
        text: "Do you have written trading rules?",
        options: [
          { label: 'Yes, I follow them',       value: 'follows' },
          { label: 'Yes, but I break them',    value: 'breaks' },
          { label: 'No, I trade intuitively',  value: 'none' },
          { label: "I'm building them now",    value: 'building' }
        ]
      },
      {
        key: 'non_monetary_cost',
        type: 'textarea',
        text: "What has trading cost you that wasn't money?",
        placeholder: "Time, relationships, sleep, confidence..."
      },
      {
        key: 'consistency_goal',
        type: 'textarea',
        text: "What would consistent trading change for you?",
        placeholder: "What becomes possible..."
      }
    ];

    const QUESTIONS_PERFORMANCE = [
      {
        key: 'biggest_challenge',
        type: 'textarea',
        text: isMarcus
          ? "What's the one thing about your own behavior that keeps costing you?"
          : "What pattern keeps showing up for you, even when you know better?",
        placeholder: "Be specific..."
      },
      {
        key: 'emotional_response_loss',
        type: 'pills',
        text: isMarcus
          ? "How do you respond emotionally to a significant loss?"
          : "After a loss, what's the first thing you feel — and what do you do with it?",
        options: [
          { label: 'I stop and reflect',           value: 'reflective' },
          { label: 'I try to recover it',          value: 'recover' },
          { label: 'I get angry or frustrated',    value: 'anger' },
          { label: 'I feel numb or dissociated',   value: 'numb' }
        ]
      },
      {
        key: 'biggest_goal',
        type: 'textarea',
        text: isMarcus
          ? "What are you actually trying to build here? In real terms."
          : "What does success look like for you — not in money, but in who you want to be as a trader?",
        placeholder: "Beyond profit..."
      },
      {
        key: 'what_tried',
        type: 'textarea',
        text: isMarcus
          ? "What have you already tried? Courses, books, other platforms, coaches. All of it."
          : "What have you tried before EdgeKeeper? I want to know what hasn't worked and why.",
        placeholder: "Everything counts..."
      },
      {
        key: 'current_rules',
        type: 'pills',
        text: isMarcus
          ? "Do you have trading rules you follow consistently?"
          : "What rules have you set for yourself — and how consistent are you actually being?",
        options: [
          { label: 'Yes, mostly',                       value: 'yes' },
          { label: 'Yes, but I break them under pressure', value: 'pressure_breaks' },
          { label: "I'm still building them",           value: 'building' },
          { label: 'No structured rules',               value: 'none' }
        ]
      },
      {
        key: 'honest_admission',
        type: 'textarea',
        text: isMarcus
          ? "One thing about your trading you haven't told anyone. I'll find out anyway, so you might as well start here."
          : "What's something true about how you trade that you haven't said out loud before?",
        placeholder: "Not what you tell other people. What you know."
      }
    ];

    const CLOSING_LINE = isMarcus
      ? 'Alright. Give me a moment with this.'
      : "I've heard enough to start.";

    /* ── STATE ──────────────────────────────── */
    let selectedPath    = null;
    let currentQuestions = [];
    let currentIndex    = 0;
    let currentAnswer   = null; /* for pill/multi-pill */
    const answers       = {};

    const pathField     = document.getElementById('path-field');
    const qField        = document.getElementById('question-field');
    const qText         = document.getElementById('question-text');
    const textarea      = document.getElementById('answer-textarea');
    const shortInput    = document.getElementById('answer-short');
    const pillContainer = document.getElementById('pill-container');
    const continueBtn   = document.getElementById('continue-btn');
    const pathContinue  = document.getElementById('path-continue');
    const progressLabel = document.getElementById('progress-label');

    /* ── PATH SELECTION ─────────────────────── */
    document.querySelectorAll('.path-block').forEach(block => {
      block.addEventListener('click', () => {
        document.querySelectorAll('.path-block').forEach(b => b.classList.remove('selected'));
        block.classList.add('selected');
        selectedPath = block.dataset.path;
        pathContinue.classList.add('enabled');
      });
    });

    /* Auto-select path if coming from paths.html via onboarding */
    (function autoSelectPath() {
      const pre = sessionStorage.getItem('ek_preselected_path');
      if (!pre) return;
      sessionStorage.removeItem('ek_preselected_path');
      const block = document.querySelector(`.path-block[data-path="${pre}"]`);
      if (!block) return;
      document.querySelectorAll('.path-block').forEach(b => b.classList.remove('selected'));
      block.classList.add('selected');
      selectedPath = pre;
      pathContinue.classList.add('enabled');
      /* Small delay so user sees which path was chosen before advancing */
      setTimeout(() => pathContinue.click(), 600);
    })();

    pathContinue.addEventListener('click', () => {
      if (!selectedPath) return;

      if (selectedPath === 'foundation') {
        currentQuestions = QUESTIONS_FOUNDATION;
      } else if (selectedPath === 'development') {
        currentQuestions = QUESTIONS_DEVELOPMENT;
      } else {
        currentQuestions = QUESTIONS_PERFORMANCE;
      }

      /* hide path screen */
      pathField.classList.add('hiding');
      setTimeout(() => {
        pathField.classList.remove('hiding');
        pathField.style.display = 'none';
        qField.style.display    = 'block';
        /* force reflow so transition fires */
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            showQuestion(0);
          });
        });
      }, 300);
    });

    /* ── SHOW QUESTION ──────────────────────── */
    function showQuestion(index) {
      const q = currentQuestions[index];
      currentAnswer = null;

      qText.textContent = q.text;
      progressLabel.textContent = 'Question ' + (index + 1) + ' of ' + currentQuestions.length;

      /* hide all input types first */
      textarea.style.display    = 'none';
      shortInput.style.display  = 'none';
      pillContainer.style.display = 'none';
      pillContainer.innerHTML   = '';
      continueBtn.classList.remove('enabled');

      if (q.type === 'textarea') {
        textarea.style.display    = 'block';
        textarea.value            = '';
        textarea.style.height     = 'auto';
        textarea.placeholder      = q.placeholder || '...';
        continueBtn.classList.remove('enabled');
      } else if (q.type === 'short') {
        shortInput.style.display  = 'block';
        shortInput.value          = '';
        shortInput.placeholder    = q.placeholder || '...';
        continueBtn.classList.remove('enabled');
      } else if (q.type === 'pills' || q.type === 'multi-pills') {
        pillContainer.style.display = 'flex';
        const isMulti = q.type === 'multi-pills';
        q.options.forEach(opt => {
          const pill = document.createElement('div');
          pill.className   = 'pill';
          pill.textContent = opt.label;
          pill.dataset.value = opt.value;
          pill.addEventListener('click', () => {
            if (isMulti) {
              pill.classList.toggle('selected');
              const selected = [...pillContainer.querySelectorAll('.pill.selected')]
                .map(p => p.dataset.value);
              currentAnswer = selected.length > 0 ? selected : null;
              continueBtn.classList.toggle('enabled', selected.length > 0);
            } else {
              pillContainer.querySelectorAll('.pill').forEach(p => p.classList.remove('selected'));
              pill.classList.add('selected');
              currentAnswer = opt.value;
              continueBtn.classList.add('enabled');
            }
          });
          pillContainer.appendChild(pill);
        });
      }

      /* divider only meaningful for text inputs */
      const divider = document.getElementById('q-divider');
      divider.style.display = (q.type === 'textarea' || q.type === 'short') ? 'block' : 'none';

      /* animate in */
      qField.classList.remove('visible', 'hiding');
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          qField.classList.add('visible');
          if (q.type === 'textarea') textarea.focus();
          if (q.type === 'short')    shortInput.focus();
        });
      });
    }

    /* ── ADVANCE ────────────────────────────── */
    function advance() {
      const q   = currentQuestions[currentIndex];
      let val   = null;

      if (q.type === 'textarea') {
        val = textarea.value.trim();
        if (val.length < 3) return;
      } else if (q.type === 'short') {
        val = shortInput.value.trim();
        if (val.length < 1) return;
      } else if (q.type === 'pills' || q.type === 'multi-pills') {
        val = currentAnswer;
        if (!val) return;
      }

      answers[q.key] = val;

      /* hide current */
      qField.classList.remove('visible');
      qField.classList.add('hiding');

      setTimeout(() => {
        qField.classList.remove('hiding');
        currentIndex++;

        if (currentIndex < currentQuestions.length) {
          setTimeout(() => showQuestion(currentIndex), 60);
        } else {
          showClosing();
        }
      }, 300);
    }

    /* ── CLOSING ────────────────────────────── */
    function showClosing() {
      progressLabel.style.opacity = '0';

      const closingScreen = document.getElementById('closing-screen');
      const closingText   = document.getElementById('closing-text');

      closingText.textContent = CLOSING_LINE;
      closingScreen.classList.add('visible');

      setTimeout(() => submitAndRedirect(), 2000);
    }

    /* ── STAGE + IDENTITY INFERENCE ─────────── */
    function inferStageAndIdentity() {
      let initial_stage, initial_identity;

      if (selectedPath === 'foundation') {
        initial_stage    = 'explorer';
        initial_identity = 'Curious Beginner';
      } else if (selectedPath === 'development') {
        const dur = answers.experience_duration || '';
        initial_stage = (dur === 'new' || dur === 'developing') ? 'student' : 'developing';

        const challenge = answers.biggest_challenge || '';
        initial_identity =
          challenge === 'rule_breaks' ? 'Reactive Trader' :
          challenge === 'revenge'     ? 'Revenge Trader'  :
          challenge === 'overtrade'   ? 'Impulsive Trader' : 'Developing Trader';
      } else {
        /* performance path */
        const lossResp = answers.emotional_response_loss || '';
        initial_stage    = 'developing'; /* default — performance users are at least developing */
        initial_identity =
          lossResp === 'anger'      ? 'Reactive Trader'   :
          lossResp === 'recover'    ? 'Chasing Trader'    :
          lossResp === 'numb'       ? 'Detached Trader'   : 'Reflective Trader';
      }

      return { initial_stage, initial_identity };
    }

    /* ── SUBMIT ─────────────────────────────── */
    async function submitAndRedirect() {
      const { initial_stage, initial_identity } = inferStageAndIdentity();

      const payload = {
        answers: { ...answers, trading_path: selectedPath },
        initial_stage,
        initial_identity,
        mentor: isMarcus ? 'mike' : 'ashley'
      };

      try {
        await fetch('/api/assessment', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify(payload)
        });
      } catch (err) {
        console.warn('Assessment submission failed:', err);
      }

      if (selectedPath === 'foundation') {
        window.location.href = '/my-academy?track=1';
      } else {
        window.location.href = '/workspace.html';
      }
    }

    /* ── TEXTAREA AUTO-EXPAND ───────────────── */
    textarea.addEventListener('input', () => {
      textarea.style.height = 'auto';
      textarea.style.height = textarea.scrollHeight + 'px';
      continueBtn.classList.toggle('enabled', textarea.value.trim().length >= 3);
    });

    shortInput.addEventListener('input', () => {
      continueBtn.classList.toggle('enabled', shortInput.value.trim().length >= 1);
    });

    /* ── KEYBOARD SHORTCUTS ─────────────────── */
    textarea.addEventListener('keydown', e => {
      if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
        e.preventDefault();
        if (continueBtn.classList.contains('enabled')) advance();
      }
    });

    shortInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        if (continueBtn.classList.contains('enabled')) advance();
      }
    });

    /* ── CONTINUE BTN ───────────────────────── */
    continueBtn.addEventListener('click', () => {
      if (continueBtn.classList.contains('enabled')) advance();
    });

    /* ── INIT ───────────────────────────────── */
    setTimeout(() => {
      pathField.classList.add('visible');
    }, 200);
  </script>
</body>
</html>
