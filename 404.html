<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="alternate icon" href="/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Not Found — EdgeKeeper</title>

  <link rel="stylesheet" href="/assets/shared.css" />

  <style>

    :root {
      --black:    #050505;
      --obsidian: #0a0a0a;
      --border:   #1e1e1e;
      --dim:      #2a2a2a;
      --muted:    #555555;
      --faint:    #888888;
      --text:     #d4d0c8;
      --bright:   #e8e4dc;
      --white:    #f5f2ec;
      --gold:     #b8a06a;
      --gold-dim: #7a6a45;
      --serif:    'Cormorant Garamond', Georgia, serif;
      --sans:     'Inter', sans-serif;
      --mono:     'DM Mono', monospace;
    }

    html { font-size: 16px; }

    body {
      background: var(--black);
      color: var(--text);
      font-family: var(--sans);
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── AMBIENT ── */
    .ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .ambient::before {
      content: '';
      position: absolute;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse at center, rgba(184,160,106,0.04) 0%, transparent 65%);
    }

    /* ── NAV ── */
    nav {
      padding: 28px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 1;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .nav-logo {
      font-family: var(--serif);
      font-size: 1.05rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: var(--bright);
      text-decoration: none;
    }
    .nav-logo span { color: var(--gold); }

    /* ── MAIN ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
      position: relative;
      z-index: 1;
    }

    .container {
      max-width: 520px;
      width: 100%;
      text-align: center;
    }

    .eyebrow {
      font-family: var(--mono);
      font-size: 0.58rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 36px;
      display: block;
    }

    .code {
      font-family: var(--serif);
      font-size: clamp(5rem, 16vw, 9rem);
      font-weight: 300;
      color: rgba(184,160,106,0.12);
      line-height: 1;
      margin-bottom: 32px;
      letter-spacing: -0.02em;
    }

    h1 {
      font-family: var(--serif);
      font-size: clamp(1.5rem, 3.5vw, 2.2rem);
      font-weight: 300;
      color: var(--white);
      line-height: 1.3;
      margin-bottom: 16px;
    }

    p {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.85;
      margin-bottom: 52px;
    }

    /* ── LINKS ── */
    .links {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .link-btn {
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      padding: 11px 22px;
      border: 1px solid var(--border);
      transition: color .2s, border-color .2s;
    }
    .link-btn:hover { color: var(--text); border-color: var(--muted); }

    .link-btn.primary {
      color: var(--gold-dim);
      border-color: rgba(184,160,106,0.3);
    }
    .link-btn.primary:hover {
      color: var(--gold);
      border-color: rgba(184,160,106,0.7);
    }

    /* ── FOOTER ── */
    footer {
      padding: 24px 48px;
      position: relative;
      z-index: 1;
      flex-shrink: 0;
      border-top: 1px solid var(--border);
    }
    .footer-copy {
      font-family: var(--mono);
      font-size: 0.58rem;
      letter-spacing: 0.14em;
      color: var(--dim);
    }

    @media (max-width: 600px) {
      nav { padding: 16px 20px; }
      footer { padding: 16px 20px; }
      .links { flex-direction: column; align-items: center; }
      .link-btn { width: 200px; text-align: center; }
    }
  </style>
</head>
<body>

<div class="ambient"></div>

<nav>
  <a href="/edgekeeper.html" class="nav-logo"><span>E</span>dgeKeeper</a>
</nav>

<main>
  <div class="container">
    <span class="eyebrow">EdgeKeeper · Navigation Error</span>
    <div class="code">404</div>
    <h1>You've wandered off the map.</h1>
    <p>
      Whatever you were looking for isn't here.<br>
      That's fine — most useful things aren't where you expect them.
    </p>
    <div class="links">
      <a href="/workspace.html" class="link-btn primary">Return to Workspace</a>
      <a href="/edgekeeper.html" class="link-btn">Home</a>
      <a href="/auth.html" class="link-btn">Sign In</a>
    </div>
  </div>
</main>

<footer>
  <span class="footer-copy">© 2025 EdgeKeeper. Private Mentorship Institution.</span>
</footer>

</body>
</html>
