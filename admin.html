<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="alternate icon" href="/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EdgeKeeper — Admin</title>
  <link rel="stylesheet" href="/assets/shared.css" />
  <style>

    :root {
      --black:    #050505;
      --obsidian: #0a0a0a;
      --stone:    #111111;
      --surface:  #161616;
      --border:   #1e1e1e;
      --dim:      #2a2a2a;
      --muted:    #555555;
      --faint:    #888888;
      --text:     #d4d0c8;
      --bright:   #e8e4dc;
      --white:    #f5f2ec;
      --gold:     #b8a06a;
      --gold-dim: #7a6a45;
      --green:    #4a7c59;
      --green-dim:#2d4d37;
      --red:      #7c4a4a;
      --red-dim:  #4d2d2d;
      --serif:    'Cormorant Garamond', Georgia, serif;
      --sans:     'Inter', sans-serif;
      --mono:     'DM Mono', monospace;
    }

    html, body { height: 100%; }

    body {
      background: var(--black);
      color: var(--text);
      font-family: var(--sans);
      font-weight: 300;
      font-size: 14px;
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      cursor: default;
    }

    /* ── HEADER ──────────────────────────────────────────────────────── */
    header {
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      background: var(--obsidian);
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .logo {
      font-family: var(--serif);
      font-size: 1rem;
      font-weight: 400;
      color: var(--bright);
      text-decoration: none;
    }
    .logo span { color: var(--gold); }
    .admin-badge {
      font-family: var(--mono);
      font-size: 0.55rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold-dim);
      background: rgba(184,160,106,0.08);
      border: 1px solid rgba(184,160,106,0.2);
      border-radius: 4px;
      padding: 3px 8px;
    }
    .header-right { display: flex; gap: 16px; align-items: center; }
    .header-link {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color .2s;
    }
    .header-link:hover { color: var(--faint); }

    /* ── MAIN LAYOUT ─────────────────────────────────────────────────── */
    main {
      flex: 1;
      padding: 32px;
      overflow-y: auto;
      max-width: 1400px;
      width: 100%;
      margin: 0 auto;
    }

    /* ── STATS ROW ───────────────────────────────────────────────────── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--stone);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px 24px;
    }
    .stat-label {
      font-family: var(--mono);
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .stat-value {
      font-family: var(--serif);
      font-size: 2rem;
      font-weight: 300;
      color: var(--white);
      line-height: 1;
    }
    .stat-value.gold { color: var(--gold); }
    .stat-value.green { color: #6ab87a; }

    /* ── TOOLBAR ─────────────────────────────────────────────────────── */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      gap: 16px;
      flex-wrap: wrap;
    }
    .toolbar-title {
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--faint);
    }
    .search-input {
      background: var(--stone);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 14px;
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--bright);
      outline: none;
      width: 260px;
      transition: border-color .2s;
    }
    .search-input::placeholder { color: var(--dim); }
    .search-input:focus { border-color: var(--gold-dim); }

    /* ── TABLE ───────────────────────────────────────────────────────── */
    .table-wrap {
      background: var(--obsidian);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead th {
      padding: 12px 16px;
      text-align: left;
      font-family: var(--mono);
      font-size: 0.57rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--stone);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .15s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--stone); }
    tbody td {
      padding: 12px 16px;
      vertical-align: middle;
      font-size: 0.82rem;
      color: var(--text);
    }
    .td-email {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--bright);
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .td-date {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ── PLAN BADGE ──────────────────────────────────────────────────── */
    .plan-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .plan-free         { background: rgba(255,255,255,0.04); color: var(--muted); border: 1px solid var(--border); }
    .plan-starter      { background: rgba(184,160,106,0.08); color: var(--gold); border: 1px solid rgba(184,160,106,0.2); }
    .plan-pro          { background: rgba(184,160,106,0.14); color: var(--gold); border: 1px solid rgba(184,160,106,0.35); }
    .plan-institutional{ background: rgba(184,160,106,0.22); color: #d4b87a; border: 1px solid rgba(184,160,106,0.5); }

    /* ── PLAN SELECT ─────────────────────────────────────────────────── */
    .plan-select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 10px;
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--text);
      outline: none;
      cursor: pointer;
      transition: border-color .2s;
    }
    .plan-select:focus { border-color: var(--gold-dim); }

    /* ── BYPASS TOGGLE ───────────────────────────────────────────────── */
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--dim);
      border-radius: 20px;
      cursor: pointer;
      transition: background .2s;
    }
    .toggle input:checked + .toggle-track { background: var(--green); }
    .toggle-thumb {
      position: absolute;
      top: 3px; left: 3px;
      width: 14px; height: 14px;
      background: var(--faint);
      border-radius: 50%;
      transition: transform .2s, background .2s;
    }
    .toggle input:checked ~ .toggle-thumb,
    .toggle input:checked + .toggle-track + .toggle-thumb {
      transform: translateX(16px);
      background: var(--white);
    }
    .toggle-label {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      color: var(--muted);
    }
    .toggle-label.active { color: #6ab87a; }

    /* ── STATUS DOT ──────────────────────────────────────────────────── */
    .status-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      margin-right: 6px;
      background: var(--dim);
    }
    .status-dot.active { background: #4a7c59; }

    /* ── EMPTY / LOADING STATE ───────────────────────────────────────── */
    .table-placeholder {
      padding: 60px 32px;
      text-align: center;
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: var(--muted);
    }

    /* ── TOAST ───────────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 20px;
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--text);
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s, transform .25s;
      white-space: nowrap;
      z-index: 999;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    #toast.success { border-color: var(--green); color: #6ab87a; }
    #toast.error   { border-color: var(--red);   color: #c97070; }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <a href="/edgekeeper.html" class="logo"><span>E</span>dgeKeeper</a>
    <span class="admin-badge">Admin</span>
  </div>
  <div class="header-right">
    <a href="/office.html"    class="header-link">Internal Office</a>
    <a href="/workspace.html" class="header-link">← Workspace</a>
  </div>
</header>

<main>

  <!-- STATS -->
  <div class="stats-row" id="stats-row">
    <div class="stat-card">
      <div class="stat-label">Total Users</div>
      <div class="stat-value" id="stat-total">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Paying</div>
      <div class="stat-value gold" id="stat-paying">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Free Access</div>
      <div class="stat-value" id="stat-free">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Bypass Active</div>
      <div class="stat-value green" id="stat-bypass">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Onboarded</div>
      <div class="stat-value" id="stat-onboarded">—</div>
    </div>
  </div>

  <!-- USER TABLE -->
  <div class="toolbar">
    <span class="toolbar-title">Members</span>
    <input
      type="text"
      class="search-input"
      id="search"
      placeholder="Search by email…"
      oninput="filterTable()"
    />
  </div>

  <div class="table-wrap">
    <table id="user-table">
      <thead>
        <tr>
          <th>Email</th>
          <th>Mentor</th>
          <th>Plan</th>
          <th>Change Plan</th>
          <th>Free Access</th>
          <th>Onboarded</th>
          <th>Joined</th>
          <th>Last Active</th>
        </tr>
      </thead>
      <tbody id="user-tbody">
        <tr><td colspan="8" class="table-placeholder">Loading members…</td></tr>
      </tbody>
    </table>
  </div>

</main>

<div id="toast"></div>

<script>
  let allUsers = [];

  // ── LOAD USERS ────────────────────────────────────────────────────────────────
  async function loadUsers() {
    try {
      const res  = await fetch('/api/admin/users');
      if (res.status === 401 || res.status === 403) {
        document.body.innerHTML = '<div style="padding:60px;text-align:center;font-family:monospace;color:#555">Access denied.</div>';
        return;
      }
      const data = await res.json();
      allUsers = data.users || [];
      renderStats(allUsers);
      renderTable(allUsers);
    } catch (err) {
      showToast('Failed to load users', 'error');
    }
  }

  // ── STATS ─────────────────────────────────────────────────────────────────────
  function renderStats(users) {
    document.getElementById('stat-total').textContent     = users.length;
    document.getElementById('stat-paying').textContent    = users.filter(u => u.subscription_status !== 'free').length;
    document.getElementById('stat-free').textContent      = users.filter(u => u.subscription_status === 'free').length;
    document.getElementById('stat-bypass').textContent    = users.filter(u => u.bypass_subscription).length;
    document.getElementById('stat-onboarded').textContent = users.filter(u => u.onboarding_complete).length;
  }

  // ── TABLE RENDER ──────────────────────────────────────────────────────────────
  const PLAN_LABELS = { free: 'Free Trial', starter: 'Resident', pro: 'Fellow', professional: 'Private Office', institutional: 'Institution' };

  function renderTable(users) {
    const tbody = document.getElementById('user-tbody');
    if (!users.length) {
      tbody.innerHTML = '<tr><td colspan="8" class="table-placeholder">No members yet.</td></tr>';
      return;
    }

    tbody.innerHTML = users.map(u => `
      <tr data-id="${u.id}" data-email="${(u.email || '').toLowerCase()}">
        <td class="td-email" title="${u.email}">${u.email}</td>
        <td style="text-transform:capitalize;color:var(--faint)">${u.mentor || '—'}</td>
        <td>
          <span class="plan-badge plan-${u.subscription_status || 'free'}">
            ${PLAN_LABELS[u.subscription_status] || u.subscription_status || 'Free'}
          </span>
        </td>
        <td>
          <select class="plan-select" onchange="changePlan('${u.id}', this.value)">
            <option value="free"          ${u.subscription_status === 'free'          ? 'selected' : ''}>Free Trial</option>
            <option value="starter"       ${u.subscription_status === 'starter'       ? 'selected' : ''}>Resident</option>
            <option value="pro"           ${u.subscription_status === 'pro'           ? 'selected' : ''}>Fellow</option>
            <option value="professional"  ${u.subscription_status === 'professional'  ? 'selected' : ''}>Private Office</option>
            <option value="institutional" ${u.subscription_status === 'institutional' ? 'selected' : ''}>Institution</option>
          </select>
        </td>
        <td>
          <label class="toggle">
            <input type="checkbox" ${u.bypass_subscription ? 'checked' : ''} onchange="toggleBypass('${u.id}', this.checked)">
            <div class="toggle-track"></div>
            <div class="toggle-thumb"></div>
          </label>
        </td>
        <td>
          <span class="status-dot ${u.onboarding_complete ? 'active' : ''}"></span>
          ${u.onboarding_complete ? 'Yes' : 'No'}
        </td>
        <td class="td-date">${formatDate(u.created_at)}</td>
        <td class="td-date">${formatDate(u.last_sign_in)}</td>
      </tr>
    `).join('');
  }

  // ── FILTER ────────────────────────────────────────────────────────────────────
  function filterTable() {
    const q = document.getElementById('search').value.toLowerCase().trim();
    const filtered = q ? allUsers.filter(u => (u.email || '').toLowerCase().includes(q)) : allUsers;
    renderTable(filtered);
  }

  // ── CHANGE PLAN ───────────────────────────────────────────────────────────────
  async function changePlan(userId, plan) {
    try {
      const res = await fetch(`/api/admin/users/${userId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ subscription_status: plan }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);

      // Update local state
      const u = allUsers.find(x => x.id === userId);
      if (u) u.subscription_status = plan;
      renderStats(allUsers);

      // Refresh the badge in the row without full re-render
      const row = document.querySelector(`tr[data-id="${userId}"]`);
      if (row) {
        const badge = row.querySelector('.plan-badge');
        if (badge) {
          badge.className = `plan-badge plan-${plan}`;
          badge.textContent = PLAN_LABELS[plan] || plan;
        }
      }
      showToast(`Plan updated → ${PLAN_LABELS[plan] || plan}`, 'success');
    } catch (err) {
      showToast(err.message || 'Update failed', 'error');
    }
  }

  // ── TOGGLE BYPASS ─────────────────────────────────────────────────────────────
  async function toggleBypass(userId, enabled) {
    try {
      const res = await fetch(`/api/admin/users/${userId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ bypass_subscription: enabled }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);

      const u = allUsers.find(x => x.id === userId);
      if (u) u.bypass_subscription = enabled;
      renderStats(allUsers);

      showToast(enabled ? 'Free access granted' : 'Free access removed', 'success');
    } catch (err) {
      showToast(err.message || 'Update failed', 'error');
      // Revert toggle visual
      loadUsers();
    }
  }

  // ── TOAST ─────────────────────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg, type = '') {
    const el = document.getElementById('toast');
    el.textContent  = msg;
    el.className    = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = type; }, 2800);
  }

  // ── DATE FORMAT ───────────────────────────────────────────────────────────────
  function formatDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  // ── INIT ──────────────────────────────────────────────────────────────────────
  loadUsers();
</script>
</body>
</html>
